<!DOCTYPE HTML>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} - QA Inventar</title>
    
    {% block styles %} 
        {{ bootstrap.load_css() }} 
        <style>
            body { background-color: #f8f9fa; }
            .navbar { border-bottom: 2px solid #0d6efd; } 
            .navbar-brand { font-weight: bold; color: #0d6efd !important; }
            .card { border: none; border-radius: 12px; }
            .btn-primary { border-radius: 8px; font-weight: 500; }
        </style>
    {% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
          <a class="navbar-brand" href="/">IRA PROJEKAT</a>
          
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
          </button>
      
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
              <li class="nav-item">
                <a class="nav-link" href="{{ url_for('home') }}">Početna</a>
              </li>
            </ul>
      
            <ul class="navbar-nav ms-auto">
              <li class="nav-item">
                <a class="btn btn-danger btn-sm text-white" href="{{ url_for('logout') }}">
                   IZLAZ (Logout)
                </a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" href="{{ url_for('home') }}">Početna</a>
            </li>
        </ul>
    
        <ul class="navbar-nav ms-auto">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('logout') }}">ODJAVI SE (TEST)</a>
                </li>
            </ul>
        </ul>
    </div>
    <div class="container">
        {% block content %}{% endblock %}
    </div>

    {% block scripts %}
        {{ bootstrap.load_js() }}
    {% endblock %}
</body>
</html>
