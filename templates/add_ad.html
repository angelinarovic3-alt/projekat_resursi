{% extends "base.html" %}
{% from "bootstrap5/form.html" import render_form %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <h2 class="mb-4">{{ title }}</h2>
            <hr>

            <div class="card shadow-sm p-4">
                {{ render_form(form) }}
            </div>
            
            <div class="mt-4">
                <a href="{{ url_for('home') }}" class="btn btn-link text-secondary">
                    <i class="fas fa-arrow-left"></i> Odustani i vrati se na dashboard
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
