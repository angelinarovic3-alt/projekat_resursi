{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-0">
                <div class="card-header bg-primary text-white py-3">
                    <h5 class="mb-0"><i class="fas fa-tools mr-2"></i> Izmena stanja i detalja kvara</h5>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="font-weight-bold">Resurs</label>
                                <select name="resurs_id" class="form-control">
                                    {% for r in resursi %}
                                    <option value="{{ r.id }}" {% if r.id == stanje.resurs_id %}selected{% endif %}>{{ r.naziv }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="font-weight-bold">Lokacija</label>
                                <select name="lokacija_id" class="form-control">
                                    {% for l in lokacije %}
                                    <option value="{{ l.id }}" {% if l.id == stanje.lokacija_id %}selected{% endif %}>{{ l.ime_lokacije }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="font-weight-bold">Zaduženi korisnik</label>
                                <select name="user_id" class="form-control">
                                    {% for u in korisnici %}
                                    <option value="{{ u.id }}" {% if u.id == stanje.user_id %}selected{% endif %}>{{ u.username }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="font-weight-bold">Trenutni status</label>
                                <select name="status_kvara" class="form-control">
                                    <option value="Ispravno" {% if stanje.status_kvara == 'Ispravno' %}selected{% endif %}>Ispravno</option>
                                    <option value="U kvaru" {% if stanje.status_kvara == 'U kvaru' %}selected{% endif %}>U kvaru</option>
                                    <option value="Na servisu" {% if stanje.status_kvara == 'Na servisu' %}selected{% endif %}>Na servisu</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="font-weight-bold">Prioritet intervencije</label>
                            <select name="prioritet" class="form-control">
                                <option value="Nizak" {% if stanje.prioritet == 'Nizak' %}selected{% endif %}>Nizak</option>
                                <option value="Srednji" {% if stanje.prioritet == 'Srednji' %}selected{% endif %}>Srednji</option>
                                <option value="Hitno" {% if stanje.prioritet == 'Hitno' %}selected{% endif %}>Hitno</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="font-weight-bold">Opis kvara / Napomena</label>
                            <textarea name="opis_stanja" class="form-control" rows="4" placeholder="Opišite problem...">{{ stanje.opis_stanja }}</textarea>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('home') }}" class="btn btn-outline-secondary px-4">Odustani</a>
                            <button type="submit" class="btn btn-primary px-5 shadow-sm">Sačuvaj izmene</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
