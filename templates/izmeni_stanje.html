{% extends "base.html" %}

{% block title %}Izmena stanja - QA & Inventar{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
            
            <!-- Putokaz (Breadcrumb) -->
            <div class="mb-4">
                <a href="{{ url_for('home') }}" class="text-decoration-none text-muted">
                    <i class="fas fa-arrow-left me-1"></i> Povratak na listu statusa
                </a>
            </div>

            <div class="card shadow border-0">
                <!-- Header sa istom plavom bojom kao na Dashboard-u -->
                <div class="card-header bg-primary text-white py-3 shadow-sm">
                    <h5 class="mb-0 fw-bold">
                        <i class="fas fa-tools me-2"></i> Izmena stanja i detalja kvara
                    </h5>
                </div>

                <div class="card-body p-4 p-md-5">
                    <form method="POST">
                        <!-- Red 1: Resurs i Lokacija -->
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Resurs</label>
                                <select name="resurs_id" class="form-select shadow-sm border-secondary-subtle">
                                    {% for r in resursi %}
                                    <option value="{{ r.id }}" {% if r.id == stanje.resurs_id %}selected{% endif %}>{{ r.naziv }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Lokacija</label>
                                <select name="lokacija_id" class="form-select shadow-sm border-secondary-subtle">
                                    {% for l in lokacije %}
                                    <option value="{{ l.id }}" {% if l.id == stanje.lokacija_id %}selected{% endif %}>{{ l.naziv }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <!-- Red 2: Korisnik i Status -->
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-primary">Zaduženi korisnik</label>
                                <select name="user_id" class="form-select shadow-sm border-primary-subtle">
                                    {% for u in korisnici %}
                                    <option value="{{ u.id }}" {% if u.id == stanje.user_id %}selected{% endif %}>{{ u.username }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-primary">Trenutni status</label>
                                <select name="status_kvara" class="form-select shadow-sm border-primary-subtle">
                                    <option value="Ispravno" {% if stanje.status_kvara == 'Ispravno' %}selected{% endif %}>Ispravno</option>
                                    <option value="U kvaru" {% if stanje.status_kvara == 'U kvaru' %}selected{% endif %}>U kvaru</option>
                                    <option value="Na servisu" {% if stanje.status_kvara == 'Na servisu' %}selected{% endif %}>Na servisu</option>
                                    <option value="Potrebna zamena" {% if stanje.status_kvara == 'Potrebna zamena' %}selected{% endif %}>Potrebna zamena</option>
                                </select>
                            </div>
                        </div>

                        <!-- Red 3: Prioritet -->
                        <div class="mb-4">
                            <label class="form-label fw-bold">Prioritet intervencije</label>
                            <select name="prioritet" class="form-select shadow-sm">
                                <option value="Nizak" {% if stanje.prioritet == 'Nizak' %}selected{% endif %}>Nizak</option>
                                <option value="Srednji" {% if stanje.prioritet == 'Srednji' %}selected{% endif %}>Srednji</option>
                                <option value="Hitno" {% if stanje.prioritet == 'Hitno' %}selected{% endif %}>Hitno</option>
                            </select>
                        </div>

                        <!-- Red 4: Opis -->
                        <div class="mb-4">
                            <label class="form-label fw-bold">Opis kvara / Napomena</label>
                            <textarea name="opis_stanja" class="form-control shadow-sm" rows="4" placeholder="Opišite problem...">{{ stanje.opis_stanja }}</textarea>
                        </div>

                        <!-- Akcije (Dugmići) - Responzivno podešeni -->
                        <div class="d-grid d-md-flex justify-content-between mt-5 gap-3">
                            <a href="{{ url_for('home') }}" class="btn btn-outline-secondary px-4 order-2 order-md-1">
                                <i class="fas fa-times me-1"></i> Odustani
                            </a>
                            <button type="submit" class="btn btn-primary px-5 shadow order-1 order-md-2">
                                <i class="fas fa-save me-1"></i> Sačuvaj izmene
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
